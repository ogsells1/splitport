<svg viewBox="0 0 1180 720" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#57534e"/>
    </marker>
    <marker id="arrowCircle" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#047857"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="720" fill="#fafaf9"/>

  <text x="40" y="40" font-size="20" font-weight="700" fill="#1c1917">SplitPort — payout flow on Arc Testnet</text>
  <text x="40" y="62" font-size="13" fill="#78716c">Green = Circle Developer tools in active use. Grey = existing rails.</text>

  <!-- Legend -->
  <rect x="820" y="20" width="14" height="14" rx="3" fill="#047857"/>
  <text x="840" y="31" font-size="12" fill="#44403c">Circle (USDC / Wallets)</text>
  <rect x="1000" y="20" width="14" height="14" rx="3" fill="#a8a29e"/>
  <text x="1020" y="31" font-size="12" fill="#44403c">Other rails</text>

  <!-- Owner / Contributor actors -->
  <rect x="40" y="100" width="160" height="56" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="120" y="124" font-size="13" font-weight="600" text-anchor="middle" fill="#1c1917">Project owner</text>
  <text x="120" y="142" font-size="11" text-anchor="middle" fill="#78716c">funds treasury</text>

  <rect x="40" y="560" width="160" height="56" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="120" y="584" font-size="13" font-weight="600" text-anchor="middle" fill="#1c1917">Contributor</text>
  <text x="120" y="602" font-size="11" text-anchor="middle" fill="#78716c">Privy wallet, claims share</text>

  <!-- Onramp -->
  <rect x="280" y="90" width="200" height="76" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="380" y="115" font-size="13" font-weight="600" text-anchor="middle" fill="#1c1917">Onramp</text>
  <text x="380" y="133" font-size="11" text-anchor="middle" fill="#78716c">Stripe card → USDC (1:1 testnet)</text>
  <text x="380" y="150" font-size="11" text-anchor="middle" fill="#78716c">or direct on-chain USDC transfer</text>

  <!-- Treasury ledger -->
  <rect x="560" y="90" width="220" height="76" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="670" y="115" font-size="13" font-weight="600" text-anchor="middle" fill="#1c1917">Treasury ledger</text>
  <text x="670" y="133" font-size="11" text-anchor="middle" fill="#78716c">Postgres (Prisma) — deposits,</text>
  <text x="670" y="150" font-size="11" text-anchor="middle" fill="#78716c">available balance per project</text>

  <!-- USDC token (Circle) -->
  <rect x="840" y="90" width="180" height="76" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/>
  <text x="930" y="115" font-size="13" font-weight="700" text-anchor="middle" fill="#047857">USDC</text>
  <text x="930" y="133" font-size="11" text-anchor="middle" fill="#065f46">Circle stablecoin</text>
  <text x="930" y="150" font-size="11" text-anchor="middle" fill="#065f46">gas token on Arc</text>

  <!-- Distribute -->
  <rect x="280" y="230" width="200" height="86" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="380" y="255" font-size="13" font-weight="600" text-anchor="middle" fill="#1c1917">Distribute</text>
  <text x="380" y="273" font-size="11" text-anchor="middle" fill="#78716c">percentage / fixed /</text>
  <text x="380" y="290" font-size="11" text-anchor="middle" fill="#78716c">scheduled / streaming</text>
  <text x="380" y="307" font-size="11" text-anchor="middle" fill="#78716c">creates Payout rows</text>

  <!-- Contributor cabinet -->
  <rect x="280" y="450" width="200" height="66" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="380" y="475" font-size="13" font-weight="600" text-anchor="middle" fill="#1c1917">Cabinet</text>
  <text x="380" y="493" font-size="11" text-anchor="middle" fill="#78716c">contributor sees claimable share</text>
  <text x="380" y="507" font-size="11" text-anchor="middle" fill="#78716c">clicks "Claim"</text>

  <!-- Settlement provider box -->
  <rect x="560" y="230" width="500" height="286" rx="12" fill="#fff" stroke="#57534e" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="580" y="254" font-size="12" font-weight="700" fill="#44403c">SettlementProvider — one interface, three signers (CUSTODY_MODE)</text>

  <!-- Custodial signer -->
  <rect x="580" y="272" width="220" height="76" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="690" y="296" font-size="12" font-weight="600" text-anchor="middle" fill="#1c1917">custodial</text>
  <text x="690" y="314" font-size="11" text-anchor="middle" fill="#78716c">viem wallet client</text>
  <text x="690" y="330" font-size="11" text-anchor="middle" fill="#78716c">EXECUTOR_PRIVATE_KEY</text>

  <!-- Circle signer -->
  <rect x="820" y="272" width="220" height="76" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
  <text x="930" y="296" font-size="12" font-weight="700" text-anchor="middle" fill="#047857">circle</text>
  <text x="930" y="314" font-size="11" text-anchor="middle" fill="#065f46">Circle Developer-Controlled</text>
  <text x="930" y="330" font-size="11" text-anchor="middle" fill="#065f46">Wallet on ARC-TESTNET</text>

  <!-- Onchain signer -->
  <rect x="700" y="372" width="220" height="76" rx="10" fill="#fff" stroke="#a8a29e" stroke-width="1.5"/>
  <text x="810" y="396" font-size="12" font-weight="600" text-anchor="middle" fill="#1c1917">onchain</text>
  <text x="810" y="414" font-size="11" text-anchor="middle" fill="#78716c">SplitVault.sol pays out</text>
  <text x="810" y="430" font-size="11" text-anchor="middle" fill="#78716c">directly from vault balance</text>

  <text x="580" y="478" font-size="11" fill="#78716c">Runtime-switchable at /admin/settlement (demo) —</text>
  <text x="580" y="494" font-size="11" fill="#78716c">same partial-claim &amp; fee-split logic for custodial and circle.</text>

  <!-- Arc settlement -->
  <rect x="900" y="560" width="230" height="76" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/>
  <text x="1015" y="585" font-size="13" font-weight="700" text-anchor="middle" fill="#047857">Arc Testnet</text>
  <text x="1015" y="603" font-size="11" text-anchor="middle" fill="#065f46">on-chain USDC transfer,</text>
  <text x="1015" y="619" font-size="11" text-anchor="middle" fill="#065f46">deterministic finality</text>

  <!-- Arrows -->
  <line x1="200" y1="128" x2="278" y2="128" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="128" x2="558" y2="128" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="780" y1="128" x2="838" y2="128" stroke="#047857" stroke-width="1.5" marker-end="url(#arrowCircle)"/>

  <line x1="670" y1="166" x2="670" y2="228" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M380,166 L380,228" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="480" y1="273" x2="558" y2="290" stroke="#57534e" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="380" y1="316" x2="380" y2="448" stroke="#57534e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="392" y="385" font-size="10" fill="#a8a29e">waits, claimable</text>

  <line x1="200" y1="588" x2="278" y2="512" stroke="#57534e" stroke-width="1.5"/>
  <line x1="278" y1="483" x2="200" y2="588" stroke="#57534e" stroke-width="0" opacity="0"/>
  <path d="M200,588 Q240,540 280,490" stroke="#57534e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M480,483 Q560,470 700,410" stroke="#57534e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M930,348 L930,558" stroke="#047857" stroke-width="1.5" marker-end="url(#arrowCircle)"/>
  <path d="M690,348 L900,590" stroke="#57534e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M810,448 L950,558" stroke="#57534e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <path d="M900,600 Q400,680 120,616" stroke="#57534e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="450" y="672" font-size="11" fill="#78716c">net USDC (gross − fee), claim tx hash recorded</text>
</svg>
